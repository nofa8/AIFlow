events {}

http {
  # Hide NGINX version in responses
  server_tokens off;

  server {
    listen 80;

    # ─── Security Headers ──────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Allow larger payloads for PDF/Image uploads
    client_max_body_size 10M;

    # ─── Route to Frontend ─────────────────────────────────────
    location / {
      proxy_pass http://aiflow_frontend:5173;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
      proxy_set_header Host $host;
    }

    # ─── Route to API Gateway ──────────────────────────────────
    location /api/ {
      proxy_pass http://aiflow_api_gateway:3000/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── Route to Realtime WebSocket Service ───────────────────
    location /ws {
      proxy_pass http://aiflow_realtime_service:4000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
      proxy_set_header Host $host;
    }

    # ─── Route to Grafana ──────────────────────────────────────
    location /grafana/ {
      # No trailing slash here so Grafana receives the full "/grafana/" path
      proxy_pass http://aiflow_grafana:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      
      # Essential headers for Grafana Live WebSockets
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
    }
  }
}