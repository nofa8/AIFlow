events {}

http {
  server_tokens off;

  # ─── WebSocket Support Map ──────────────────────────────────
  # Dynamically sets the Connection header to "upgrade" if the 
  # client requests a WebSocket upgrade, otherwise sets it to "close".
  map $http_upgrade $connection_upgrade {
      default upgrade;
      ''      close;
  }

  # ─── Gzip Compression ───────────────────────────────────────
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml;
  gzip_proxied any;
  gzip_min_length 1000;

  server {
    listen 80;

    # ─── Security Headers ──────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    client_max_body_size 10M;

    # ─── Global Proxy Settings (TRULY DRY) ─────────────────────
    # Because there are NO proxy_set_header directives in the 
    # location blocks below, these will successfully inherit everywhere.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Global WebSocket Support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # ─── Route to Frontend ─────────────────────────────────────
    location / {
      proxy_pass http://aiflow_frontend:5173;
    }

    # ─── Route to API Gateway ──────────────────────────────────
    location /api/ {
      # Trailing slash strips /api/ -> passes / to backend
      proxy_pass http://aiflow_api_gateway:3000/;
      
      proxy_read_timeout 120s;
      proxy_connect_timeout 5s;
    }

    # ─── Route to Realtime WebSocket Service ───────────────────
    location /ws {
      # No trailing slash -> passes /ws to backend
      proxy_pass http://aiflow_realtime_service:4000;

      proxy_connect_timeout 2s; 
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # ─── Route to Grafana ──────────────────────────────────────
    location /grafana/ {
      proxy_pass http://aiflow_grafana:3000;
    }

    # ─── Route to MinIO ──────────────────────────────────────
    location /minio/ {
      proxy_pass http://minio:9000/;
      proxy_set_header Host minio:9000;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_connect_timeout 2s;
      proxy_read_timeout 600s;
    }
  }
}