networks:
  aiflow-net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  redis_data:
  grafana_data:

services:

  # ─── 1. Infrastructure ──────────────────────────────────────────

  postgres:
    image: docker.io/postgres:15
    container_name: aiflow_postgres
    restart: on-failure
    env_file: .env
    networks:
      - aiflow-net
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./task-service/init.sql:/docker-entrypoint-initdb.d/init.sql:z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: docker.io/rabbitmq:3-management
    container_name: aiflow_rabbitmq
    restart: on-failure
    networks:
      - aiflow-net
    command: >
      bash -c "rabbitmq-plugins enable --offline rabbitmq_prometheus && rabbitmq-server"
    ports:
      - "15672:15672"
      - "15692:15692"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 10

  redis:
    image: docker.io/redis:7
    container_name: aiflow_redis
    restart: on-failure
    networks:
      - aiflow-net
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis-exporter:
    image: docker.io/oliver006/redis_exporter:latest
    container_name: aiflow_redis_exporter
    restart: on-failure
    networks:
      - aiflow-net
    environment:
      - REDIS_ADDR=${REDIS_URL}
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    # healthcheck:
    #   test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9121/metrics || exit 1"]
    #   interval: 5s
    #   timeout: 5s
    #   retries: 10

  minio:
    image: docker.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: aiflow_minio
    restart: on-failure
    command: server /data --console-address ":9001"
    env_file: .env
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - aiflow-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── 2. Backend Services ────────────────────────────────────────

  task-service:
    build: ./task-service
    container_name: aiflow_task_service
    restart: on-failure
    stop_grace_period: 10s
    env_file: .env
    networks:
      - aiflow-net
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  api-gateway:
    build: ./api-gateway
    container_name: aiflow_api_gateway
    restart: on-failure
    env_file: .env
    networks:
      - aiflow-net
    depends_on:
      task-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build: ./worker
    container_name: aiflow_worker
    restart: on-failure
    stop_grace_period: 30s
    env_file: .env
    networks:
      - aiflow-net
    # deploy:
    #   replicas: 3
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4002/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  realtime-service:
    build: ./realtime-service
    container_name: aiflow_realtime_service
    restart: on-failure
    stop_grace_period: 10s
    env_file: .env
    networks:
      - aiflow-net
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4001/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── 3. Frontend ────────────────────────────────────────────────

  frontend:
    build: ./frontend
    container_name: aiflow_frontend
    restart: on-failure
    networks:
      - aiflow-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    # No port 5173 exposure; NGINX handles it

  # ─── 4. Reverse Proxy (Single Entrypoint) ───────────────────────

  nginx:
    image: docker.io/nginx:latest
    container_name: aiflow_nginx
    restart: on-failure
    networks:
      - aiflow-net
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro,z
    depends_on:
      frontend:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
      realtime-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  tunnel:
    container_name: aiflow_tunnel
    image: cloudflare/cloudflared:latest
    restart: on-failure
    environment:
     - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    #command: tunnel --no-autoupdate --url http://aiflow_nginx:80
    networks:
      - aiflow-net
    depends_on:
      nginx:
        condition: service_started

  # ─── 6. Observability ───────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: aiflow_prometheus
    restart: on-failure
    networks:
      - aiflow-net
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro,z
    ports:
      - "9090:9090"
    depends_on:
      task-service:
        condition: service_healthy
      worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:11.6.0
    container_name: aiflow_grafana
    env_file: .env
    restart: on-failure
    networks:
      - aiflow-net
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro,z
      - grafana_data:/var/lib/grafana
    ports:
      - "3002:3000" 
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5