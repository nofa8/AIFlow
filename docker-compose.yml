networks:
  aiflow-net:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
  redis_data:

services:

  # ─── 1. Infrastructure ──────────────────────────────────────────

  postgres:
    image: docker.io/postgres:15
    container_name: aiflow_postgres
    restart: unless-stopped
    env_file: .env
    networks:
      - aiflow-net
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./task-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: docker.io/rabbitmq:3-management
    container_name: aiflow_rabbitmq
    restart: unless-stopped
    networks:
      - aiflow-net
    ports:
      - "15672:15672" # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 10

  redis:
    image: docker.io/redis:7
    container_name: aiflow_redis
    restart: unless-stopped
    networks:
      - aiflow-net
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── 2. Backend Services ────────────────────────────────────────

  api-gateway:
    build: ./api-gateway
    container_name: aiflow_api_gateway
    restart: unless-stopped
    env_file: .env
    networks:
      - aiflow-net
    depends_on:
      task-service:
        condition: service_started

  task-service:
    build: ./task-service
    container_name: aiflow_task_service
    restart: unless-stopped
    env_file: .env
    networks:
      - aiflow-net
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./worker
    container_name: aiflow_worker
    restart: unless-stopped
    env_file: .env
    networks:
      - aiflow-net
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  realtime-service:
    build: ./realtime-service
    container_name: aiflow_realtime_service
    restart: unless-stopped
    env_file: .env
    networks:
      - aiflow-net
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ─── 3. Frontend ────────────────────────────────────────────────

  frontend:
    build: ./frontend
    container_name: aiflow_frontend
    restart: unless-stopped
    networks:
      - aiflow-net
    # No port 5173 exposure; NGINX handles it

  # ─── 4. API Proxy (Entrypoint) ──────────────────────────────────

  nginx:
    image: docker.io/nginx:latest
    container_name: aiflow_nginx
    restart: unless-stopped
    networks:
      - aiflow-net
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro,z
    depends_on:
      - frontend
      - api-gateway
      - realtime-service
