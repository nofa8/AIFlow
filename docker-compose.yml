networks:
  aiflow-net:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:

services:

  # ─── Infrastructure ─────────────────────────────────────────────

  postgres:
    image: docker.io/postgres:15
    container_name: aiflow_postgres
    restart: unless-stopped
    env_file: .env
    networks:
      - aiflow-net
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./task-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: docker.io/rabbitmq:3-management
    container_name: aiflow_rabbitmq
    restart: unless-stopped
    networks:
      - aiflow-net
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 10

  # ─── Backend Services ───────────────────────────────────────────

  api-gateway:
    build: ./api-gateway
    container_name: aiflow_api_gateway
    restart: unless-stopped
    env_file: .env
    networks:
      - aiflow-net
    ports:
      - "3000:3000"
    depends_on:
      task-service:
        condition: service_started

  task-service:
    build: ./task-service
    container_name: aiflow_task_service
    restart: unless-stopped
    env_file: .env
    networks:
      - aiflow-net
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build: ./worker
    container_name: aiflow_worker
    restart: unless-stopped
    env_file: .env
    networks:
      - aiflow-net
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  realtime-service:
    build: ./realtime-service
    container_name: aiflow_realtime_service
    restart: unless-stopped
    env_file: .env
    networks:
      - aiflow-net
    ports:
      - "4000:4000"
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ─── Frontend ───────────────────────────────────────────────────

  frontend:
    build: ./frontend
    container_name: aiflow_frontend
    restart: unless-stopped
    networks:
      - aiflow-net
    ports:
      - "5173:5173"
    depends_on:
      api-gateway:
        condition: service_started
